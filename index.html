<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路攻防lab4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .message-board {
            border: 1px solid #ddd;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .message-board textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
        }

        #messages p {
            background: #f7f7f7;
            padding: 10px;
            border-radius: 6px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <h1>歡迎！</h1>
    <p>我是 r13921a23，目前就讀台大資安所。</p>

    <img src="https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/453510362_7929691880445017_8718045469063657100_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=WaupSZLPAP8Q7kNvgEvFK96&_nc_oc=AdknjfPFHfVNZje7aTFDE2pfqj1lhOpytFIwynOm8RgEVK8PSh-8rEe7VKGvdir5dOs&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=2J-UnSFMh8nOuLW835wn-A&oh=00_AYFd1Vg9fRwlsy3LwfDZMHF7BUCwh4LVncwFwjD1jM__wg&oe=67E7EC20" alt="個人照片">

    <div class="message-board">
        <h2>留言板</h2>
        <form id="messageForm">
            <textarea id="message" placeholder="請輸入您的留言..."></textarea><br>
            <button type="submit">送出留言</button>
        </form>

        <h3>留言列表</h3>
        <div id="messages"></div>
    </div>

    <script>
        let visitorCount = localStorage.getItem('visitorCount') || 0;
        visitorCount++;
        localStorage.setItem('visitorCount', visitorCount);
        document.getElementById('visitorCount').innerText = visitorCount;

        document.getElementById('messageForm').addEventListener('submit', function(event) {
            event.preventDefault();

            let message = document.getElementById('message').value.trim();
            if (message) {
                let messageList = document.getElementById('messages');
                let newMessage = document.createElement('p');
                newMessage.innerText = message;
                messageList.appendChild(newMessage);
                document.getElementById('message').value = '';
            }
        });
    </script>
</body>
</html>
